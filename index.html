<!DOCTYPE html>
<html dir="rtl" lang="ar" id="mainHtml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Edrak Professional Portal</title>

<link rel="manifest" href="manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
--edrak-blue:#1A3668;
--edrak-red:#E31D2B;
--edrak-orange:#F37021;
--soft-bg:#F0F4F8;
--text-dark:#2C3E50;
}
body {
background:var(--soft-bg);
margin:0;
font-family:Segoe UI;
}
.navbar {background:#fff;padding:10px 5%;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.offcanvas {width:300px}

.nav-link-sidebar {
padding:18px 25px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #eee;
cursor:pointer;
}
.nav-link-sidebar:hover {background:#f5f7ff}

.notification-badge {
background:#E31D2B;
color:#fff;
border-radius:50%;
display:none;
padding:4px 8px;
}

.hero-container {
height:80vh;
display:flex;
justify-content:center;
align-items:center;
background:#fff;
}
.hero-container img {width:300px;border-radius:20px}

iframe {
width:100%;
height:calc(100vh - 65px);
border:none;
display:none;
}

#globalLoader {
position:absolute;
top:0;bottom:0;left:0;right:0;
display:flex;
justify-content:center;
align-items:center;
background:#fff;
}
</style>
</head>

<body>

<nav class="navbar d-flex justify-content-between align-items-center">
<button class="btn" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
<i class="fas fa-bars"></i>
</button>
<b>Edrak HR System</b>
<div onclick="toggleLanguage()" id="langBtn">EN</div>
</nav>

<div class="offcanvas offcanvas-start" id="sidebarMenu">
<div class="p-3 bg-dark text-white">Menu</div>

<div class="nav-link-sidebar" onclick="openInApp('https://script.google.com/macros/s/AKfycbz6XAGnYRfEXSp53cNUM_BRfM57JsHivRHf707mcFPbHEUmqGJnwyAMF-G7evrdVPmy/exec','Fingerprint')">
البصمة
</div>

<div class="nav-link-sidebar" onclick="openInApp('https://script.google.com/macros/s/AKfycbzOrVa1h1hxezhgl03-JVJTOCYEoE0jgZYCRCOZxIc2aBELR99sCZmIGOVkMdxTEEhi/exec','Employee Data')">
الموظفين
</div>

<div class="nav-link-sidebar" onclick="openInApp('https://script.google.com/macros/s/AKfycbw5VcMM53VLRVChGweps8r5hoQN01uuH9rm7GaKeW-Qq8UjxshBCkM7RpziSQVdkGG1/exec','Information')">
<span class="txt-guide">معلومات تهمك</span>
</div>

<div class="nav-link-sidebar" onclick="openInApp('https://script.google.com/macros/s/AKfycbxkqi73nIaiQUiEMKhn6hSKSwPQQlZ67_3QxBJiWO4bWGc0wQ00jvNlTzeMY_CA8mCQ/exec','Notifications')">
الإشعارات
<span id="notifBadge" class="notification-badge">0</span>
</div>

<div class="nav-link-sidebar" onclick="openInApp('https://script.google.com/macros/s/AKfycbzYRyHrys_D_t7qa3cpMxh3_BIFs_FFQ-EciUHrjvqwzhQ8StXETrMhnRKDHtCnhrnC/exec','Reports')">
<span class="txt-reports">التقارير</span>
</div>

</div>

<div class="hero-container">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_bxPxMDdkYISQbRLcmYnEpiKs0-44MqXMyg&s">
</div>

<div class="modal fade" id="appModal">
<div class="modal-dialog modal-fullscreen">
<div class="modal-content">

<div class="p-2 border-bottom d-flex justify-content-between">
<span id="modalTitleDisplay"></span>
<button class="btn btn-dark" data-bs-dismiss="modal">رجوع</button>
</div>

<div class="position-relative">
<div id="globalLoader">Loading...</div>
<iframe id="appIframe"></iframe>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const modal=new bootstrap.Modal(document.getElementById('appModal'));
const iframe=document.getElementById('appIframe');
const loader=document.getElementById('globalLoader');

/* فتح الأنظمة */
function openInApp(url,title){
document.getElementById('modalTitleDisplay').innerText=title;
loader.style.display='flex';
iframe.style.display='none';
modal.show();
iframe.src=url;
}

iframe.onload=()=>{
loader.style.display='none';
iframe.style.display='block';
}

/* الإشعارات */
function updateNotif(){
fetch("https://script.google.com/macros/s/AKfycbxkqi73nIaiQUiEMKhn6hSKSwPQQlZ67_3QxBJiWO4bWGc0wQ00jvNlTzeMY_CA8mCQ/exec?action=count")
.then(r=>r.json())
.then(d=>{
if(d.count>0){
notifBadge.innerText=d.count;
notifBadge.style.display='block';
}
});
}

window.onload=updateNotif;

/* اللغة */
let currentLang='ar';

function toggleLanguage(){
currentLang=currentLang==='ar'?'en':'ar';
document.getElementById('langBtn').innerText=currentLang==='ar'?'EN':'AR';
document.documentElement.dir=currentLang==='ar'?'rtl':'ltr';

document.querySelector('.txt-guide').innerText=currentLang==='ar'?'معلومات تهمك':'Information';
document.querySelector('.txt-reports').innerText=currentLang==='ar'?'التقارير':'Reports';
}
</script>

</body>
</html>
