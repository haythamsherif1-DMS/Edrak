<!DOCTYPE html>
<html dir="rtl" lang="ar" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edrak Professional Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #004a99;
            --soft-bg: #f4f7f9;
        }

        body {
            background-color: var(--soft-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 12px 5%;
            position: sticky; top: 0; z-index: 1000;
        }

        /* Sidebar */
        .offcanvas { width: 300px !important; border: none; box-shadow: 5px 0 20px rgba(0,0,0,0.1); }
        .sidebar-header { background: var(--primary-blue); color: white; padding: 30px 20px; }
        .nav-link-sidebar {
            padding: 18px 25px; color: #444; text-decoration: none;
            display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid #f0f0f0; transition: 0.3s; font-weight: 500;
        }
        .nav-link-sidebar:hover { background: #f0f7ff; color: var(--primary-blue); transform: translateX(-5px); }

        /* --- تصميم الـ 3D المخصص للموبايل واللاب توب --- */
        .hero-container {
            height: calc(100vh - 80px);
            display: flex; align-items: center; justify-content: center;
            perspective: 1500px;
            padding: 20px;
            background: white;
        }
        
        .scene-3d {
            width: 100%;
            max-width: 750px;
            transform: rotateX(10deg) rotateY(-10deg);
            transform-style: preserve-3d;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .scene-3d:hover {
            transform: rotateX(0deg) rotateY(0deg) scale(1.05);
        }

        .main-hero-img {
            width: 100%;
            height: auto;
            border-radius: 30px;
            box-shadow: 25px 25px 50px rgba(0,0,0,0.2);
            border: 10px solid white;
            display: block;
        }

        /* Modal & Loader UI */
        .modal-full { max-width: 100%; margin: 0; height: 100%; }
        .modal-content { height: 100vh; border: none; border-radius: 0; overflow: hidden; position: relative; }
        .back-nav-bar { background: white; padding: 12px 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #eee; }
        .btn-back-style { background: var(--primary-blue); color: white; border: none; padding: 8px 25px; border-radius: 50px; font-weight: bold; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        #globalLoader { position: absolute; top: 65px; left: 0; right: 0; bottom: 0; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1200; }
        .loader-visual { width: 60px; height: 60px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        iframe { width: 100%; height: calc(100vh - 65px); border: none; display: block; visibility: hidden; }
        .lang-toggle { cursor: pointer; padding: 6px 18px; border: 2px solid var(--primary-blue); border-radius: 25px; color: var(--primary-blue); font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
        <button class="btn p-0 border-0" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
            <i class="fas fa-bars fa-2x text-primary"></i>
        </button>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_bxPxMDdkYISQbRLcmYnEpiKs0-44MqXMyg&s" height="45" alt="Logo">
    </div>
    <div class="lang-toggle" onclick="toggleLanguage()" id="langBtn">EN</div>
</nav>

<div class="offcanvas offcanvas-start" id="sidebarMenu">
    <div class="sidebar-header">
        <h4 id="sideTitle">نظام إدراك</h4>
        <p class="small mb-0 opacity-75">Edrak Professional Portal</p>
    </div>
    <div class="offcanvas-body p-0">
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbztP1ilB78dgkDAv3RE0_TOr_ShvXff23c2PKljm7-O5z1ORVlndU2i8UmpekovIKbK/exec', 'Employee Data')" class="nav-link-sidebar">
            <i class="fas fa-users-cog"></i> <span class="txt-db">بيانات الموظفين</span>
        </a>
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbyamFoOoj0GAZ--yHlYNvdxCtS59s8FFPfftvb4N0m4qARNMChMLKgDN7fs9jyjGtsC/exec', 'Payroll')" class="nav-link-sidebar">
            <i class="fas fa-file-invoice-dollar"></i> <span class="txt-payroll">مفردات المرتب</span>
        </a>
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbzDqqrb5-dNIlEfAU7uZeZ2-aXbR9E15z2MK3K2S7woytuOsu2WCUpHpaJ9GJdFWZ0/exec', 'Vacations')" class="nav-link-sidebar">
            <i class="fas fa-calendar-alt"></i> <span class="txt-vacation">الإجازات والأذونات</span>
        </a>
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbxGF_-V8PU6BIYyBZIq8Ysi8FqnvSToEAgVqrL5z2EjOMQi8tH06i5fCCn0kh5hPsTo/exec?page=user', 'Notifications')" class="nav-link-sidebar">
            <i class="fas fa-bell"></i> <span class="txt-notif">الإشعارات الحديثة</span>
        </a>
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbwlxTldi-h9GyNuQY1d2ev45XxTniaJgq_7aM9CuAP3g_qtUMlhppq98E44tpZOGMU/exec', 'Contact')" class="nav-link-sidebar">
            <i class="fas fa-comments"></i> <span class="txt-contact">تواصل معنا</span>
        </a>
    </div>
</div>

<div class="hero-container">
    <div class="scene-3d animate__animated animate__zoomIn">
        <img src="https://www.wipo.int/dpp-files/54294/54294.jpg" alt="Edrak Portal Illustration">
    </div>
</div>

<div class="modal fade" id="appModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-full">
        <div class="modal-content">
            <div class="back-nav-bar">
                <span class="fw-bold text-primary" id="modalTitleDisplay">System</span>
                <button type="button" class="btn-back-style" data-bs-dismiss="modal">
                    <span id="backTxt">رجوع</span> <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <div class="modal-body p-0 position-relative">
                <div id="globalLoader">
                    <div class="loader-visual"></div>
                    <h5 id="loadingTxt" class="mt-3 text-primary fw-bold">جاري التحميل...</h5>
                </div>
                <iframe src="" id="appIframe"></iframe>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentLang = 'ar';
    const modal = new bootstrap.Modal(document.getElementById('appModal'));
    const iframe = document.getElementById('appIframe');
    const loader = document.getElementById('globalLoader');

    function openInApp(url, title) {
        document.getElementById('modalTitleDisplay').innerText = title;
        loader.style.display = 'flex';
        iframe.style.visibility = 'hidden';
        iframe.src = "about:blank";
        const cacheBuster = "t=" + new Date().getTime();
        iframe.src = url + (url.includes('?') ? '&' : '?') + 'authuser=0&' + cacheBuster;
        modal.show();
        bootstrap.Offcanvas.getInstance(document.getElementById('sidebarMenu')).hide();
    }

    iframe.onload = () => { if(iframe.src !== "about:blank") { loader.style.display = 'none'; iframe.style.visibility = 'visible'; } };

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const html = document.getElementById('mainHtml');
        html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'EN' : 'AR';
        updateTexts(currentLang);
    }

    function updateTexts(l) {
        const trans = {
            ar: { db: "بيانات الموظفين", pay: "مفردات المرتب", vac: "الإجازات والأذونات", notif: "الإشعارات الحديثة", contact: "تواصل معنا", back: "رجوع", side: "نظام إدراك" },
            en: { db: "Employee Data", pay: "Payroll", vac: "Vacations", notif: "Recent Notifications", contact: "Contact Us", back: "Back", side: "Edrak System" }
        };
        document.querySelector('.txt-db').innerText = trans[l].db;
        document.querySelector('.txt-payroll').innerText = trans[l].pay;
        document.querySelector('.txt-vacation').innerText = trans[l].vac;
        document.querySelector('.txt-notif').innerText = trans[l].notif;
        document.querySelector('.txt-contact').innerText = trans[l].contact;
        document.getElementById('backTxt').innerText = trans[l].back;
        document.getElementById('sideTitle').innerText = trans[l].side;
    }
</script>
</body>
</html>
