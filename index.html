<!DOCTYPE html>
<html dir="rtl" lang="ar" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edrak Professional Portal</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
           --edrak-blue: #1A3668;
           --edrak-red: #E31D2B;
           --edrak-orange: #F37021;
            --soft-bg: #F8FAFC;
            --text-dark: #1E293B;
            --sidebar-bg: #F1F5F9;
        }
        body {
           background-color: var(--soft-bg);
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            height: 100vh;
            color: var(--text-dark);
        }
        .navbar {
           background: white;
           box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            padding: 12px 5%;
            position: sticky; top: 0; z-index: 1000;
        }
        
        /* تصميم الـ Offcanvas الحديث */
        .offcanvas { 
            width: 320px !important; 
            border: none; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.08); 
            background-color: var(--sidebar-bg) !important;
        }
        
        .sidebar-header {
            background: linear-gradient(135deg, var(--edrak-blue) 0%, #102244 100%);
            color: white;
            padding: 30px 24px;
            position: relative;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 15px rgba(26, 54, 104, 0.2);
        }
        .sidebar-header .btn-close-white {
            position: absolute;
            top: 25px;
            left: 20px;
            opacity: 0.8;
            transition: 0.3s;
        }
        html[dir="ltr"] .sidebar-header .btn-close-white {
            left: auto;
            right: 20px;
        }
        .sidebar-header .btn-close-white:hover {
            opacity: 1;
            transform: rotate(90deg);
        }
    
        /* تنسيق الروابط كـ كروت تفاعلية */
        .nav-links-wrapper {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-link-sidebar {
            padding: 14px 18px;
            color: var(--text-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid rgba(0, 0, 0, 0.01);
        }

        .nav-link-sidebar i.nav-icon {
            color: var(--edrak-blue);
            width: 36px;
            height: 36px;
            background: rgba(26, 54, 104, 0.06);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        
        html[dir="ltr"] .nav-link-sidebar i.nav-icon {
            margin-left: 0;
            margin-right: 10px;
        }
        
        .nav-link-sidebar .arrow-icon {
            font-size: 0.8rem;
            color: #94A3B8;
            transition: transform 0.3s ease;
        }

        /* تأثيرات التحويم والمرور */
        .nav-link-sidebar:hover {
            background: white;
            color: var(--edrak-orange);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border-color: rgba(243, 112, 33, 0.2);
        }
        .nav-link-sidebar:hover i.nav-icon {
            background: rgba(243, 112, 33, 0.1);
            color: var(--edrak-orange);
            transform: scale(1.05);
        }
        .nav-link-sidebar:hover .arrow-icon {
            color: var(--edrak-orange);
            transform: translateX(-4px);
        }
        html[dir="ltr"] .nav-link-sidebar:hover .arrow-icon {
            transform: translateX(4px);
        }

        /* الرقم الأحمر الدائري للإشعارات */
        .notification-badge {
            background-color: var(--edrak-red);
            color: white;
            font-weight: bold;
            font-size: 12px;
            min-width: 24px;
            height: 24px;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(227, 29, 43, 0.4);
            margin-left: 10px;
        }
        html[dir="ltr"] .notification-badge {
            margin-left: 0;
            margin-right: 10px;
        }
        
        .hero-container {
            height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            padding: 20px;
            background: white;
            overflow: hidden;
        }
    
        .scene-3d {
            width: 80%;
            max-width: 450px;
            transform-style: preserve-3d;
            transition: all 0.6s ease;
            transform: rotateX(5deg) rotateY(-5deg);
        }
        @media (max-width: 768px) {
            .scene-3d {
                width: 70%;
                max-width: 250px;
                transform: rotateX(0deg) rotateY(0deg);
            }
        }
        .main-hero-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 5px solid white;
        }
        .modal-full { max-width: 100%; margin: 0; height: 100%; }
        .modal-content { height: 100vh; border: none; border-radius: 0; overflow: hidden; position: relative; background-color: white;}
    
        .back-nav-bar {
           background: white;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #eee;
        }
    
       .modal-title-text { color: var(--edrak-blue); font-weight: bold; }
       .btn-back-style {
           background: var(--edrak-blue);
            color: white;
            border: none;
            padding: 8px 25px;
           border-radius: 50px;
           font-weight: bold;
            display: flex;
           align-items: center;
            gap: 10px;
            cursor: pointer;
           transition: 0.3s;
        }
       .btn-back-style:hover { background: var(--edrak-red); }
        #globalLoader { position: absolute; top: 65px; left: 0; right: 0; bottom: 0; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1200; }
      
        .loader-visual {
            width: 50px; height: 50px;
            border: 4px solid #f3f3f3;
           border-top: 4px solid var(--edrak-orange);
           border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
        #loadingTxt { color: var(--edrak-blue); }
        iframe { width: 100%; height: calc(100vh - 65px); border: none; display: block; visibility: hidden; }
    
        .lang-toggle {
            cursor: pointer;
            padding: 6px 18px;
            border: 2px solid var(--edrak-blue);
           border-radius: 25px;
            color: var(--edrak-blue);
           font-weight: bold;
           transition: 0.3s;
        }
       .lang-toggle:hover { background: var(--edrak-blue); color: white; }
    </style>
</head>

<script>
    let currentLang = 'ar';
    const modalEl = document.getElementById('appModal');
    const modal = new bootstrap.Modal(modalEl);
    const iframe = document.getElementById('appIframe');
    const loader = document.getElementById('globalLoader');

    function updateNotifCount() {
        fetch("https://script.google.com/macros/s/AKfycbxkqi73nIaiQUiEMKhn6hSKSwPQQlZ67_3QxBJiWO4bWGc0wQ00jvNlTzeMY_CA8mCQ/exec?action=count")
            .then(res => res.json())
            .then(data => {
                const badge = document.getElementById('notifBadge');
                const count = parseInt(data.count) || 0;
                console.log("📊 عدد الإشعارات:", count);
                if (count > 0) {
                    badge.innerText = count;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            })
            .catch(err => {
                console.error("❌ خطأ في جلب عدد الإشعارات:", err);
                document.getElementById('notifBadge').style.display = 'none';
            });
    }

    window.addEventListener('load', () => {
        updateNotifCount();
        setInterval(updateNotifCount, 30000);
    });

    modalEl.addEventListener('hidden.bs.modal', function () {
        iframe.src = "about:blank";
        iframe.style.visibility = 'hidden';
    });

    function requestLocAndOpen(url, title) {
        if (navigator.geolocation) {
           navigator.geolocation.getCurrentPosition(
                () => { openInApp(url, title); },
                () => { openInApp(url, title); },
                { enableHighAccuracy: true, timeout: 5000 }
          );
        } else {
           openInApp(url, title);
        }
    }

    function openInApp(url, title) {
       document.getElementById('modalTitleDisplay').innerText = title;
       loader.style.display = 'flex';
       iframe.style.visibility = 'hidden';
        const finalUrl = url + (url.includes('?') ? '&' : '?') + 'authuser=0';
        modal.show();
    
        const offcanvasEl = document.getElementById('sidebarMenu');
        const openedOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasEl);
        if (openedOffcanvas) openedOffcanvas.hide();
    
        setTimeout(() => {
            iframe.src = finalUrl;
        }, 100);
    }

    iframe.onload = () => {
        if(iframe.src !== "about:blank" && iframe.src !== "") {
           loader.style.display = 'none';
           iframe.style.visibility = 'visible';
        }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const html = document.getElementById('mainHtml');
        html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
       document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'EN' : 'AR';
       updateTexts(currentLang);
    }

    function updateTexts(l) {
        const trans = {
            ar: {
               finger: "البصمة الذكية", db: "بيانات الموظفين", pay: "مفردات المرتب",
                vac: "الإجازات والأذونات", archive: "أرشيف ملفات الموظفين",
               renewal: "نظام التجديدات", hrLetter: "خطابات الموارد البشرية",
                notif: "الإشعارات الحديثة", contact: "تواصل معنا",
                guide: "معلومات تهمك", back: "رجوع", side: "نظام إدراك",
                loading: "جاري التحميل...", 
                reports: "التقارير"
            },
            en: {
               finger: "Smart Fingerprint", db: "Employee Data", pay: "Payroll",
                vac: "Vacations", archive: "HR Archive", renewal: "HR Renewal System",
               hrLetter: "HR Letter", notif: "Recent Notifications", contact: "Contact Us",
                guide: "Information For U", back: "Back", side: "Edrak System",
                loading: "Loading...",
                reports: "Reports"
            }
        };
        document.querySelectorAll('.txt-finger')[0].innerText = trans[l].finger;
        document.querySelectorAll('.txt-db')[0].innerText = trans[l].db;
        document.querySelectorAll('.txt-payroll')[0].innerText = trans[l].pay;
        document.querySelectorAll('.txt-vacation')[0].innerText = trans[l].vac;
        document.querySelectorAll('.txt-archive')[0].innerText = trans[l].archive;
        document.querySelectorAll('.txt-renewal')[0].innerText = trans[l].renewal;
        document.querySelectorAll('.txt-hr-letter')[0].innerText = trans[l].hrLetter;
        document.querySelectorAll('.txt-notif')[0].innerText = trans[l].notif;
        document.querySelectorAll('.txt-contact')[0].innerText = trans[l].contact;
        document.querySelectorAll('.txt-guide')[0].innerText = trans[l].guide;
        
        const reportsTxt = document.querySelectorAll('.txt-reports');
        if(reportsTxt.length > 0) reportsTxt[0].innerText = trans[l].reports;

        document.getElementById('backTxt').innerText = trans[l].back;
        document.getElementById('sideTitle').innerText = trans[l].side;
        document.getElementById('loadingTxt').innerText = trans[l].loading;
        document.querySelector('.txt-hr-desc').innerText = l === 'ar' ? "Edrak HR System" : "Edrak HR System";
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
    }
</script>
</body>
</html>
